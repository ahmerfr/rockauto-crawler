name: Free-US Crawl Probe (no Evomi)

# Decisive experiment for the under-$30 full-mirror plan: can GitHub's FREE US
# runners crawl RockAuto directly (no paid proxy), get CORRECT US prices, and
# survive the securimage CAPTCHA via OCR? If yes, the bulk crawl costs ~$0 and
# Evomi is only a fallback. Crawls the one vehicle we already have Evomi-US truth
# prices for (2010 Acura ZDX 3.7L V6) so prices can be compared directly.
# Manual dispatch only; single short job; no paid bytes.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest       # GitHub-hosted = US-region Azure IP
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tesseract OCR + deps
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Runner IP + country (must be US for correct prices)
        run: curl -s https://ipinfo.io/json || true
      # THE $30 QUESTION: is the catalogapi.php listing fragment <= 2KB gzipped?
      # 12.7M leaf pages * 2KB = 26GB = ~$30 on Evomi. At today's 16KB full page it
      # is 208GB = $239. Byte size is IP-independent, but our local IP is blocked, so
      # this measures from the free US runner.
      - name: Smoke the wired fragment crawl (direct US, NO captcha-solve)
        env:
          SP_USE_EVOMI: "0"
          SP_USE_PROXIES: "0"
          SP_SOLVE_CAPTCHA: "0"
          SP_DOWNLOAD_IMAGES: "0"
          SP_MIN_DELAY: "0.4"
          SP_MAX_DELAY: "0.8"
          SP_YEAR_MIN: "2008"
          SP_YEAR_MAX: "2012"
          SP_BUDGET_STATE: coverage/smoke_bytes.txt
        run: |
          mkdir -p coverage artifacts
          SP_MAX_GB="0.3" python scraper/crawl_jsonl.py --only-makes acura \
            --out artifacts/smoke.ndjson --budget 220 --max-seconds 600 || true
          python - <<'PY'
          import json, os
          rows=[]
          if os.path.exists("artifacts/smoke.ndjson"):
              rows=[json.loads(l) for l in open("artifacts/smoke.ndjson",encoding="utf-8")]
          leaves=set(); priced=0
          for r in rows:
              leaves.add(r.get("source_url") or (r.get("category_path"),r.get("model_name")))
              if r.get("price") is not None: priced+=1
          b=open("coverage/smoke_bytes.txt").read().strip() if os.path.exists("coverage/smoke_bytes.txt") else "0"
          spent=int(b) if b.isdigit() else 0
          print(f"RESULT listings={len(rows)} leaves={len(leaves)} priced={priced}")
          print(f"RESULT bytes_spent={spent} bytes_per_leaf={spent/max(1,len(leaves)):.0f} (fragment~11500 fullpage~22800)")
          for r in rows:
              if "Wiper Blade" in (r.get("category_path") or ""):
                  print("SAMPLE", r.get("brand_name"), r.get("part_number"), "$"+str(r.get("price")));
          PY
