name: Free-US Crawl Probe (no Evomi)

# Decisive experiment for the under-$30 full-mirror plan: can GitHub's FREE US
# runners crawl RockAuto directly (no paid proxy), get CORRECT US prices, and
# survive the securimage CAPTCHA via OCR? If yes, the bulk crawl costs ~$0 and
# Evomi is only a fallback. Crawls the one vehicle we already have Evomi-US truth
# prices for (2010 Acura ZDX 3.7L V6) so prices can be compared directly.
# Manual dispatch only; single short job; no paid bytes.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest       # GitHub-hosted = US-region Azure IP
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tesseract OCR + deps
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # DATACENTER-PROXY GO/NO-GO: does a cheap rotating DC proxy (a) exit in the US
      # (so RockAuto shows correct US prices) and (b) survive the ~200-req/IP wall via
      # rotation WITHOUT captcha-solving? If yes -> the full 146GB catalog is ~$44 at
      # ~$0.30/GB. Set the SP_PROXY_URL secret to your Webshare/Rayobyte rotating
      # endpoint (http://user:pass@host:port) before running.
      - name: Datacenter-proxy GO/NO-GO smoke (ACURA, fragment path, NO captcha-solve)
        env:
          SP_PROXY_URL: ${{ secrets.SP_PROXY_URL }}
          SP_USE_EVOMI: "0"
          SP_SOLVE_CAPTCHA: "0"
          SP_DOWNLOAD_IMAGES: "0"
          SP_MIN_DELAY: "0.3"
          SP_MAX_DELAY: "0.7"
          SP_ROTATE_EVERY: "60"
          SP_YEAR_MIN: "2008"
          SP_YEAR_MAX: "2012"
          SP_BUDGET_STATE: coverage/dc_bytes.txt
        run: |
          if [ -z "$SP_PROXY_URL" ]; then
            echo "!! No SP_PROXY_URL secret set. Add your datacenter-proxy rotating URL as repo secret SP_PROXY_URL, then re-run."; exit 1; fi
          mkdir -p coverage artifacts
          echo "=== exit IP THROUGH the datacenter proxy (need country=US for correct prices) ==="
          curl -s --proxy "$SP_PROXY_URL" --max-time 25 https://ipinfo.io/json || echo "GEO: proxy request failed"
          echo
          SP_MAX_GB="0.3" python scraper/crawl_jsonl.py --only-makes acura \
            --out artifacts/dc_smoke.ndjson --budget 260 --max-seconds 800 || true
          python - <<'PY'
          import json, os
          rows=[]
          if os.path.exists("artifacts/dc_smoke.ndjson"):
              rows=[json.loads(l) for l in open("artifacts/dc_smoke.ndjson",encoding="utf-8")]
          leaves=set(); priced=0
          for r in rows:
              leaves.add(r.get("source_url") or (r.get("category_path"),r.get("model_name")))
              if r.get("price") is not None: priced+=1
          b=open("coverage/dc_bytes.txt").read().strip() if os.path.exists("coverage/dc_bytes.txt") else "0"
          spent=int(b) if b.isdigit() else 0
          print(f"RESULT listings={len(rows)} leaves={len(leaves)} priced={priced}")
          print(f"RESULT bytes_spent={spent} bytes_per_leaf={spent/max(1,len(leaves)):.0f} (fragment~11500)")
          for r in rows:
              if "Wiper Blade" in (r.get("category_path") or ""):
                  print("SAMPLE", r.get("brand_name"), r.get("part_number"), "$"+str(r.get("price")))
          PY
