name: Free-US Crawl Probe (no Evomi)

# Decisive experiment for the under-$30 full-mirror plan: can GitHub's FREE US
# runners crawl RockAuto directly (no paid proxy), get CORRECT US prices, and
# survive the securimage CAPTCHA via OCR? If yes, the bulk crawl costs ~$0 and
# Evomi is only a fallback. Crawls the one vehicle we already have Evomi-US truth
# prices for (2010 Acura ZDX 3.7L V6) so prices can be compared directly.
# Manual dispatch only; single short job; no paid bytes.

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest       # GitHub-hosted = US-region Azure IP
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tesseract OCR + deps
        run: |
          sudo apt-get update && sudo apt-get install -y tesseract-ocr
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Runner IP + country (must be US for correct prices)
        run: curl -s https://ipinfo.io/json || true
      - name: Crawl ACURA direct (no Evomi, no proxy) — OCR-solve CAPTCHAs
        env:
          SP_USE_EVOMI: "0"
          SP_USE_PROXIES: "0"        # direct runner IP, no datacenter proxy
          SP_SOLVE_CAPTCHA: "1"      # OCR the securimage wall
          SP_MIN_DELAY: "0.5"
          SP_MAX_DELAY: "1.2"
          SP_DOWNLOAD_IMAGES: "0"
          SP_YEAR_MIN: "2010"
          SP_YEAR_MAX: "2010"
          SP_BUDGET_STATE: coverage/probe_bytes.txt
        run: |
          mkdir -p coverage artifacts
          SP_MAX_GB="0.3" python scraper/crawl_jsonl.py \
            --only-makes acura \
            --out artifacts/free_acura.ndjson \
            --budget 400 --max-seconds 1200 || true
          echo "=== bytes spent (data-only): $(cat coverage/probe_bytes.txt 2>/dev/null) ==="
          echo "=== listing rows: $(wc -l < artifacts/free_acura.ndjson 2>/dev/null) ==="
      - name: Report prices + coverage (for comparison vs Evomi-US truth)
        run: |
          python - <<'PY'
          import json, collections
          rows=[];
          try:
              rows=[json.loads(l) for l in open("artifacts/free_acura.ndjson",encoding="utf-8")]
          except FileNotFoundError:
              pass
          print("rows:", len(rows))
          cats=collections.Counter()
          for r in rows:
              cp=(r.get("category_path") or "").split(">")[-1].strip()
              if cp: cats[cp]+=1
          print("distinct leaf categories:", len(cats))
          # sample ZDX wiper-blade prices to eyeball vs known US truth (~$1-$30)
          for r in rows:
              if "Wiper Blade" in (r.get("category_path") or ""):
                  print(f'  WIPER {r.get("brand_name")} {r.get("part_number")}: ${r.get("price")}')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: free-probe-acura
          path: artifacts/free_acura.ndjson
          if-no-files-found: warn
